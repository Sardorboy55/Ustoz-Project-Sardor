name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Web / Admin / Shared (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspaces --if-present
      - run: npm run typecheck --workspaces --if-present
      - run: npm run build --workspace apps/web
      - run: npm run build --workspace apps/admin

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test

  edge:
    name: Edge Functions (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-env --allow-net --allow-import sms-hook/index_test.ts
        working-directory: supabase/functions

  db:
    name: Supabase migrations + seed (db reset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: supabase start -x studio,imgproxy,inbucket,edge-runtime,logflare,vector
      - run: supabase db reset
      - run: supabase stop
