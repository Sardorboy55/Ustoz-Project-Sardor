name: Build Android APK

# Собираем APK мобильного приложения в облаке (Linux) — здесь нет ограничения
# macOS 14, в отличие от локальной машины. Запуск вручную: вкладка Actions →
# "Build Android APK" → Run workflow. Готовый APK — в артефактах прогона.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (riverpod / freezed / json)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ibilim-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
