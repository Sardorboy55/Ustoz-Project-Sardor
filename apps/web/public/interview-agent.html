<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>IBILIM — собеседование</title>
  <style>
    :root { --brand: #2563eb; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #fafafa; color: #18181b;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card { text-align: center; max-width: 380px; width: 100%; }
    .mic {
      width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 18px;
      background: var(--brand); color: #fff; display: flex; align-items: center;
      justify-content: center; font-size: 38px; position: relative;
    }
    .mic.loading { background: #a1a1aa; }
    .mic.live::after {
      content: ""; position: absolute; inset: 0; border-radius: 50%;
      background: var(--brand); opacity: .5; animation: ping 1.4s ease-out infinite;
    }
    @keyframes ping { 0%{transform:scale(1);opacity:.5} 100%{transform:scale(1.8);opacity:0} }
    h1 { font-size: 18px; font-weight: 800; margin: 0 0 8px; }
    p { color: #71717a; font-size: 14px; margin: 0 0 18px; line-height: 1.45; }
    button {
      border: 0; border-radius: 14px; padding: 16px 24px; font-size: 17px;
      font-weight: 800; cursor: pointer; width: 100%; max-width: 300px;
    }
    button:disabled { opacity: .55; cursor: default; }
    .primary { background: var(--brand); color: #fff; }
    .secondary { background: #fff; color: #18181b; border: 1px solid #d4d4d8; }
    #status { color: #2563eb; font-size: 13px; margin: 12px 0 0; min-height: 16px; font-weight: 600; }
    #err { color: #b91c1c; font-size: 13px; margin-top: 10px; min-height: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="mic" class="mic loading">🎙️</div>
    <h1 id="title"></h1>
    <p id="hint"></p>
    <button id="startBtn" class="primary" disabled></button>
    <button id="stopBtn" class="secondary" style="display:none"></button>
    <p id="status"></p>
    <p id="err"></p>
  </div>

  <!-- ВАЖНО: UI выставляется СИНХРОННЫМ обычным скриптом (не module).
       Раньше всё было внутри <script type="module"> c верхнеуровневым
       import с esm.sh. В UZ-сети сторонние CDN режутся → импорт падал →
       модуль не исполнялся → подписи не ставились (пустая кнопка/текст) и
       клик не навешивался (агент молчал). Теперь UI рисуется всегда, а SDK
       грузится отдельно через динамический import() с fallback-цепочкой. -->
  <script>
    (function () {
      var AGENT_ID = "agent_7401kvd53vehfx4vz17gmaac7aw5";
      var q = new URLSearchParams(location.search);
      var subject = q.get("subject") || "";
      var lang = (q.get("lang") || "uz").toLowerCase();

      var T = {
        uz: {
          idle: "Suhbatni boshlaymizmi?",
          hint: "Tugmani bosing, mikrofonga ruxsat bering — agent suhbatni boshlaydi.",
          start: "Suhbatni boshlash",
          live: "Suhbat ketyapti",
          liveHint: "Ovoz bilan javob bering. Agent xayrlashgach — tugatishingiz mumkin.",
          stop: "Suhbatni tugatish",
          micErr: "Mikrofonga ruxsat kerak.",
          connErr: "Ulanib bo'lmadi. Qaytadan urinib ko'ring.",
          loadingSdk: "Ovozli modul yuklanmoqda…",
          sdkErr: "Ovozli modulni yuklab bo'lmadi. Internetni tekshirib, qaytadan urinib ko'ring.",
          connecting: "Ulanmoqda…",
        },
        ru: {
          idle: "Начнём собеседование?",
          hint: "Нажмите кнопку, разрешите микрофон — агент начнёт разговор.",
          start: "Начать разговор",
          live: "Идёт разговор",
          liveHint: "Отвечайте вслух. Когда агент попрощается — можно завершить.",
          stop: "Завершить разговор",
          micErr: "Нужен доступ к микрофону.",
          connErr: "Не удалось подключиться. Попробуйте снова.",
          loadingSdk: "Загрузка голосового модуля…",
          sdkErr: "Не удалось загрузить голосовой модуль. Проверьте интернет и попробуйте снова.",
          connecting: "Подключаюсь…",
        },
        en: {
          idle: "Start the interview?",
          hint: "Tap the button, allow the microphone — the agent will start.",
          start: "Start conversation",
          live: "Conversation in progress",
          liveHint: "Answer aloud. When the agent says goodbye, you can finish.",
          stop: "End conversation",
          micErr: "Microphone access is required.",
          connErr: "Could not connect. Try again.",
          loadingSdk: "Loading voice module…",
          sdkErr: "Could not load the voice module. Check your internet and try again.",
          connecting: "Connecting…",
        },
      };
      var L = T[lang] || T.uz;

      var $ = function (id) { return document.getElementById(id); };

      // --- UI ВСЕГДА (синхронно, до и независимо от SDK) ---
      $("title").textContent = L.idle;
      $("hint").textContent = L.hint;
      $("startBtn").textContent = L.start;
      $("stopBtn").textContent = L.stop;
      $("status").textContent = L.loadingSdk; // пока грузится SDK

      // Bridge to the Flutter app (JavaScriptChannel named IBILIM).
      function post(obj) {
        try {
          if (window.IBILIM && window.IBILIM.postMessage) {
            window.IBILIM.postMessage(JSON.stringify(obj));
          }
        } catch (e) {}
      }

      // --- Загрузка SDK: динамический import() с fallback-цепочкой ---
      // САМОХОСТ ПЕРВЫМ: узбекская сеть режет сторонние CDN, но наш домен
      // достаёт (страница же грузится). Бандл собран из @elevenlabs/client@1.11.2
      // (esbuild, ESM, self-contained). CDN — только запасной путь.
      var SDK_SOURCES = [
        "/vendor/elevenlabs-client.js",
        "https://ibilim.uz/vendor/elevenlabs-client.js",
        "https://cdn.jsdelivr.net/npm/@elevenlabs/client@1.11.2/+esm",
        "https://esm.sh/@elevenlabs/client@1.11.2",
        "https://unpkg.com/@elevenlabs/client@1.11.2?module",
      ];

      var Conversation = null;
      var sdkReady = false;

      function dynImport(url) {
        // import() в обычном скрипте: оборачиваем, чтобы не падал парсинг.
        return new Function("u", "return import(u)")(url);
      }

      async function loadSdk() {
        for (var i = 0; i < SDK_SOURCES.length; i++) {
          try {
            var mod = await dynImport(SDK_SOURCES[i]);
            if (mod && mod.Conversation) {
              Conversation = mod.Conversation;
              return true;
            }
          } catch (e) {
            // пробуем следующий источник
          }
        }
        return false;
      }

      var conv = null;
      var probeStream = null;
      var busy = false;

      function setLive(live) {
        $("mic").classList.toggle("live", live);
        $("startBtn").style.display = live ? "none" : "block";
        $("stopBtn").style.display = live ? "block" : "none";
        $("title").textContent = live ? L.live : L.idle;
        $("hint").textContent = live ? L.liveHint : L.hint;
        $("status").textContent = live ? L.live : "";
      }

      function releaseProbe() {
        try {
          if (probeStream) probeStream.getTracks().forEach(function (t) { t.stop(); });
        } catch (e) {}
        probeStream = null;
      }

      function cleanup() { conv = null; releaseProbe(); setLive(false); }

      async function start() {
        // Один сеанс за раз. Без этого повторное нажатие плодило параллельные
        // сессии, которые дрались за микрофон и обрывали голос агента.
        if (busy || conv) return;
        if (!sdkReady || !Conversation) { $("err").textContent = L.sdkErr; return; }
        busy = true;
        $("startBtn").disabled = true;
        $("err").textContent = "";
        $("status").textContent = L.connecting;
        // Микрофон с ЭХОПОДАВЛЕНИЕМ. В режиме websocket (UZ режет WebRTC) нет
        // встроенного AEC — без этого агент слышит свой голос из динамика,
        // срабатывает «перебивание» и приветствие обрывается в начале. Поток
        // держим живым весь сеанс, чтобы устройство оставалось в режиме AEC.
        try {
          probeStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
          });
        } catch (e) {
          $("err").textContent = L.micErr;
          $("status").textContent = "";
          post({ type: "error", reason: "mic" });
          $("startBtn").disabled = false; busy = false;
          return;
        }
        try {
          conv = await Conversation.startSession({
            agentId: AGENT_ID,
            connectionType: "websocket",
            dynamicVariables: { subject: subject || "—" },
            onConnect: function (info) {
              var id = info && (info.conversationId || info.conversation_id);
              post({ type: "connected", conversationId: id });
              setLive(true);
            },
            onDisconnect: function () { post({ type: "disconnected" }); cleanup(); },
            onError: function (e) {
              $("err").textContent = L.connErr;
              post({ type: "error", message: String(e) });
            },
          });
        } catch (e) {
          $("err").textContent = L.connErr;
          $("status").textContent = "";
          post({ type: "error", message: String(e) });
          cleanup();
        } finally {
          $("startBtn").disabled = false;
          busy = false;
        }
      }

      async function stop() {
        try { if (conv) await conv.endSession(); } catch (e) {}
        cleanup();
      }

      $("startBtn").addEventListener("click", start);
      $("stopBtn").addEventListener("click", stop);

      // Грузим SDK и активируем кнопку только когда он готов.
      loadSdk().then(function (ok) {
        sdkReady = ok;
        if (ok) {
          $("mic").classList.remove("loading");
          $("status").textContent = "";
          $("startBtn").disabled = false;
        } else {
          $("mic").classList.remove("loading");
          $("status").textContent = "";
          $("err").textContent = L.sdkErr;
          $("startBtn").disabled = true;
          post({ type: "error", reason: "sdk_load" });
        }
      });
    })();
  </script>
</body>
</html>
