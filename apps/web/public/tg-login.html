<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IBILIM — Telegram</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #fafafa;
      color: #18181b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { text-align: center; padding: 24px; max-width: 360px; }
    h1 { font-size: 20px; font-weight: 800; margin: 0 0 8px; color: #2563eb; }
    p { color: #71717a; font-size: 14px; margin: 0 0 20px; }
    #status { margin-top: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>IBILIM</h1>
    <p>Telegram orqali kiring · Войдите через Telegram</p>
    <div id="tg"></div>
    <a id="openapp" href="#" style="display:none;margin-top:14px;padding:14px 22px;background:#2563eb;color:#fff;border-radius:12px;font-weight:700;text-decoration:none;font-size:15px;">Открыть приложение IBILIM</a>
    <p id="status"></p>
  </div>
  <script>
    // Telegram Login Widget → возврат в нативное приложение по deep link.
    // bot и домен совпадают с веб-входом (BotFather /setdomain).
    function onTelegramAuth(user) {
      var qs = Object.keys(user)
        .map(function (k) {
          return encodeURIComponent(k) + "=" + encodeURIComponent(user[k]);
        })
        .join("&");
      var ua = navigator.userAgent || "";
      // Android: intent:// надёжно запускает приложение по ТАПУ; iOS: кастомная схема.
      var deep = /android/i.test(ua)
        ? "intent://tg-callback?" + qs +
          "#Intent;scheme=uz.ustoz.app;package=uz.ustoz.app;end"
        : "uz.ustoz.app://tg-callback?" + qs;
      // Главное — видимая кнопка: авто-переход из JS браузеры часто блокируют,
      // поэтому пользователь жмёт кнопку (это гарантированный жест → запуск app).
      var btn = document.getElementById("openapp");
      btn.href = deep;
      btn.style.display = "inline-block";
      document.getElementById("status").textContent =
        "Готово! Если приложение не открылось — нажмите синюю кнопку выше.";
      // Лучшее усилие — пробуем открыть автоматически (если браузер разрешит).
      try { window.location.href = deep; } catch (e) {}
    }
    (function () {
      var s = document.createElement("script");
      s.src = "https://telegram.org/js/telegram-widget.js?22";
      s.async = true;
      s.setAttribute("data-telegram-login", "ibilim_login_bot");
      s.setAttribute("data-size", "large");
      s.setAttribute("data-radius", "12");
      s.setAttribute("data-onauth", "onTelegramAuth(user)");
      s.setAttribute("data-request-access", "write");
      document.getElementById("tg").appendChild(s);
    })();
  </script>
</body>
</html>
