name: ustoz_mobile
description: "USTOZ — tutor & specialist marketplace for Uzbekistan (mobile app)."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # state & architecture
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # navigation
  go_router: ^16.3.0

  # models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # backend
  supabase_flutter: ^2.10.3

  # misc
  intl: any # pinned by flutter_localizations
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  video_player: ^2.11.1
  flutter_svg: ^2.0.10
  app_links: ^6.3.2
  url_launcher: ^6.3.0
  jitsi_meet_flutter_sdk: ^12.1.3
  webview_flutter: ^4.14.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true # gen-l10n from lib/l10n/*.arb
  assets:
    - assets/images/
    - assets/logo/
    - assets/icons/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
